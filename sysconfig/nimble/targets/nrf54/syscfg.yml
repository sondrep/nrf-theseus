syscfg.vals:
    # TODO: HFXO with nrf52_clock_hfxo_request/release?
    MCU_HFCLK_SOURCE: HFINT
    # Values measured to be found _okay_ when doing firmware update related
    # activites. They may need further tuning.
    MSYS_1_BLOCK_COUNT: 35
    MSYS_1_BLOCK_SIZE: 304
    BLE_SM_IO_CAP: 'BLE_HS_IO_DISPLAY_ONLY'
    BLE_SM: 1
    BLE_LL_CFG_FEAT_LE_ENCRYPTION: 1
    BLE_LL_CFG_FEAT_LL_PRIVACY: 1
    BLE_SM_SC_ONLY: 1
    BLE_SM_LEGACY: 0
    BLE_SM_MITM: 1
    BLE_SM_LVL: 4

    # HCI memory pools
    BLE_TRANSPORT_EVT_COUNT: 4
    BLE_TRANSPORT_EVT_DISCARDABLE_COUNT: 16
    BLE_TRANSPORT_ACL_COUNT: 10

    BLE_TRANSPORT_LL: "custom"
